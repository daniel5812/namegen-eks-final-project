apiVersion: apps/v1
kind: Deployment
metadata:
  name: namegen
spec:
  replicas: 1
  selector:
    matchLabels:
      app: namegen
  template:
    metadata:
      labels:
        app: namegen
    spec:
      containers:
        - name: namegen
          image: 696223520711.dkr.ecr.eu-central-1.amazonaws.com/namegen-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: MONGODB_URL
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: MONGODB_URL
