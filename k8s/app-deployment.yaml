apiVersion: apps/v1
kind: Deployment
metadata:
  name: namegen
spec:
  replicas: 1
  selector:
    matchLabels:
      app: namegen
  template:
    metadata:
      labels:
        app: namegen
    spec:
      containers:
        - name: namegen
          image: namegen-app:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: MONGODB_URL
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: MONGODB_URL