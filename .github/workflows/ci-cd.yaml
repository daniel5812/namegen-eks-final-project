name: CI/CD to Amazon EKS

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-central-1
  AWS_ACCOUNT_ID: "696223520711"
  ECR_REPOSITORY: namegen-app
  EKS_CLUSTER_NAME: namegen-eks-cluster
  IMAGE_TAG: latest

jobs:
  build-and-deploy:
    name: Build, Push to ECR, and Deploy to EKS
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:3.6
        ports:
          - 27017:27017

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        env:
          MONGODB_URL: mongodb://localhost:27017/namegen
        run: npm test

      - name: Configure AWS credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build -t $ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REPOSITORY:$IMAGE_TAG $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Push Docker image to ECR
        run: |
          docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name $EKS_CLUSTER_NAME \
            --region $AWS_REGION

      - name: Deploy Kubernetes manifests to EKS
        run: |
          kubectl apply -f k8s/storageclass-eks.yaml
          kubectl apply -f k8s/mongodb-secret.yaml
          kubectl apply -f k8s/mongodb-init-configmap.yaml
          kubectl apply -f k8s/mongodb-service.yaml
          kubectl apply -f k8s/mongodb-statefulset-eks.yaml
          kubectl apply -f k8s/app-deployment-eks.yaml
          kubectl apply -f k8s/app-service-eks.yaml

      - name: Restart application deployment
        run: |
          kubectl rollout restart deployment/namegen
          kubectl rollout status deployment/namegen